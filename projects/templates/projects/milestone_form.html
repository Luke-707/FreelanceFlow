{% extends 'base.html' %}

{% block title %}Add Milestone - FreelanceFlow{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card p-4">
            <h2 class="mb-4">Add Milestone to {{ project.title }}</h2>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}
                    <p class="text-danger small">{{ error }}</p>
                    {% endfor %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-success w-100">Add Milestone</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
