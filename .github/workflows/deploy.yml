name: CI/CD - Build & Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    name: Build Docker Image & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/freelanceflow:latest

  deploy:
    name: Deploy to AWS EC2
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Create project and Nginx directories
            mkdir -p ~/freelanceflow/nginx
            
            # 2. Create docker-compose.yml
            cat > ~/freelanceflow/docker-compose.yml << 'EOF'
            version: "3.8"
            services:
              web:
                image: ${{ secrets.DOCKER_USERNAME }}/freelanceflow:latest
                container_name: freelanceflow_web
                restart: unless-stopped
                expose:
                  - "8000"
                volumes:
                  - sqlite_data:/app/db_data
                networks:
                  - webnet
              nginx:
                image: nginx:alpine
                container_name: freelanceflow_nginx
                restart: unless-stopped
                ports:
                  - "80:80"
                volumes:
                  - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
                depends_on:
                  - web
                networks:
                  - webnet
            networks:
              webnet:
                driver: bridge
            volumes:
              sqlite_data:
            EOF
            
            # 3. Create Nginx Configuration
            cat > ~/freelanceflow/nginx/nginx.conf << 'NGINXEOF'
            server {
                listen 80;
                location / {
                    proxy_pass         http://web:8000;
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                }
            }
            NGINXEOF
            
            # 4. Pull latest images and restart containers
            cd ~/freelanceflow
            docker compose down || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/freelanceflow:latest
            docker compose up -d
            
            # 5. Clean up old images
            docker image prune -f
            
            echo "Deployment to AWS completed successfully!"
